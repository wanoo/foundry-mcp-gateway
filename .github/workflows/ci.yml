name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Le nom du job `build-and-test` est référencé par le ruleset de la branche
# principale (required status check) — le renommer bloquerait toutes les PR.
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build --release
      - name: Test
        run: cargo test
      # Les chiffres de la doc sont vérifiés contre le binaire, pas relus à la
      # main : ils ont déjà dérivé trois fois.
      - name: Docs match the code
        run: ./scripts/check-docs.sh

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
